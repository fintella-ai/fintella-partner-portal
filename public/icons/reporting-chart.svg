<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#c4a050" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
  <!-- baseline -->
  <line x1="3" y1="21" x2="21" y2="21"/>
  <!-- ascending bars -->
  <rect x="4.5"  y="16" width="2" height="5"/>
  <rect x="9"    y="12" width="2" height="9"/>
  <rect x="13.5" y="8"  width="2" height="13"/>
  <rect x="18"   y="5"  width="2" height="16"/>
  <!-- trend line climbing over the bars -->
  <polyline points="3.5,15 7,12 11,9 15,6 19,3"/>
  <!-- arrow head at top-right of the line -->
  <polyline points="15,3 19,3 19,7"/>
</svg>
